spring:
  config:
    activate:
      on-profile: test

  datasource:
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  flyway:
    enabled: true

url:
  origin:
    client: http://localhost:3000/

discord:
  bot:
    token: dummy

logging:
  level:
    org:
      hibernate:
        SQL: WARN
